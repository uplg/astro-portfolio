map $http_accept_language $accept_lang_fr {
    default 0;
    "~^fr" 1;
}

# Combine: redirect only if Accept-Language is fr AND no cookie set
map "$accept_lang_fr:$cookie_lang_redirect" $should_redirect_fr {
    default "";
    "1:"    "/fr";
}

server {
    listen 80;
    listen [::]:80;
    server_name uplg.xyz www.uplg.xyz;
    
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;

    server_name uplg.xyz www.uplg.xyz;
    
    ssl_certificate /etc/letsencrypt/live/uplg.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uplg.xyz/privkey.pem;

    root /var/www/hostings/uplg;
    index index.html;
    
    error_page 404 /404.html;

    rewrite ^/(.*)/+$ /$1 permanent;

    # Accept-Language redirect: only on exact root, only for fr, only without cookie
    location = / {
        if ($should_redirect_fr) {
            add_header Set-Cookie "lang_redirect=1; Path=/; Max-Age=31536000; SameSite=Lax" always;
            return 302 /fr;
        }
        try_files $uri $uri.html $uri/index.html =404;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
    }

    # FR locale: serve French 404 page
    location /fr {
        error_page 404 /fr/404/index.html;
        try_files $uri $uri.html $uri/index.html =404;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
    }

    # Default: EN pages + everything else
    location / {
        try_files $uri $uri.html $uri/index.html =404;
        
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
    }
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        access_log off;
    }
    
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public";
        add_header Vary Accept-Encoding;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
    }
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
    
    location ~ /\.(?!well-known).* {
        return 444;
    }

    location /.well-known/acme-challenge {
      root /usr/share/nginx/html;
    }
}
